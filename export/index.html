<!DOCTYPE html>
<html>
<head>
    <title>Godot Tower Defense</title>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #222;
            color: #fff;
            font-family: Arial;
            text-align: center;
        }
        h1 { color: #4CAF50; }
        .box {
            background: #333;
            padding: 20px;
            margin: 20px auto;
            border-radius: 5px;
            max-width: 600px;
        }
        code {
            background: #000;
            padding: 10px;
            display: inline-block;
            border-radius: 3px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🎮 Godot Tower Defense</h1>
    <div class="box">
        <h2>✅ Docker 正常運作！</h2>
        <p>遊戲將在此顯示</p>
    </div>
    <div class="box">
        <h3>📝 在 Godot 中導出：</h3>
        <code>Project → Export → HTML5 → Export Project</code>
        <p>選擇導出到 <code>export</code> 資料夾</p>
    </div>
    <div class="box">
        <h3>🔄 重新啟動容器：</h3>
        <code>docker-compose up -d --build</code>
    </div>
</body>
</html>
