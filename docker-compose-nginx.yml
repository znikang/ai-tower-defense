version: '3.8'

services:
  godot-tower-defense:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: godot-tower-defense-nginx
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
